name: bobo_food_delivery_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  audioplayers: ^6.5.1
  bloc_test: ^10.0.0
  cached_network_image: ^3.4.1
  cherry_toast: ^1.13.0
  cloud_firestore: ^6.1.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  easy_localization: ^3.0.8
  equatable: ^2.0.7
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  fl_chart: ^0.69.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage: ^9.2.4
  flutter_stripe: ^12.1.1
  flutter_svg: ^2.2.2
  freezed: ^3.2.3
  freezed_annotation: 3.1.0
  get_it: ^9.1.0
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  injectable: ^2.6.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  local_auth: ^3.0.0
  mockito: ^5.5.0
  pretty_dio_logger: ^1.4.0
  privacy_screen: ^0.0.8
  retrofit: ^4.0.1
  secure_application: ^4.1.0
  flutter_screenutil: ^5.9.3
  sentry_flutter: ^9.8.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  toastification: ^3.0.3
  pinput: ^6.0.2
  flutter_native_splash: ^2.4.7

dev_dependencies:
  build_runner: ^2.7.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  injectable_generator: null
  json_serializable: ^6.9.0
  mockito: ^5.4.4
  retrofit_generator: ^10.0.0
  sentry_dart_plugin: ^3.2.0


flutter:


  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/svgs/
    - assets/images/
    - assets/images/splash/
    - assets/images/onboarding/
    

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Trajan Pro
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
